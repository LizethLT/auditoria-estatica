name: Auditoria Estatica de Calidad (IEEE 1028)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  audit-and-quality:
    name: Inspección de Código Estática
    runs-on: windows-latest

    steps:
    - name: Descargar Código Fuente
      uses: actions/checkout@v4

    - name: Configurar Entorno .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Ejecutar Script de Auditoría Automatizada
      run: |
        powershell -ExecutionPolicy Bypass -File ./audit-script.ps1